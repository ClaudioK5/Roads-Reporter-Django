<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Загрузка Excel-файла</title>
</head>
<body>
    <h1>Загрузка Excel-файла с данными об автомобильных дорогах</h1>

    {% if message %}
        <p style="color: green;">{{ message }}</p>
    {% endif %}

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    {% if total_text %}
        <p>
            <strong>{{ total_text }}</strong>
        </p>
    {% endif %}

    {% if report_url %}
        <p>
            <a href="{{ report_url }}" download>Скачать готовый Word-отчет</a>
        </p>
    {% endif %}

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Загрузить</button>
    </form>
</body>
</html>
